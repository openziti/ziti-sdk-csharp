name: Matrix Build and publish Ziti Native to nuget

on:
  # Nightly: resolve the latest ziti-sdk-c release and publish it if nuget.org doesn't have it yet.
  schedule:
    # 04:17 UTC nightly (off the top of the hour to dodge cron congestion).
    - cron: '17 4 * * *'
  # Same machine, on demand. Leave version blank to do exactly what the nightly does (publish the latest csdk);
  # or give an explicit full version to (re)publish a specific build.
  workflow_dispatch:
    inputs:
      version:
        description: Full package version to publish, e.g. 1.18.2.50 (<ziti-sdk-c version>.<revision>). Leave blank to publish the latest ziti-sdk-c release automatically.
        default: ''
        required: false
      debugOrRelease:
        description: Debug or Release
        default: Release
        required: true
      dryRun:
        description: Run everything (build, pack, smoke, e2e) but do NOT push to nuget.org
        type: boolean
        default: false
      force:
        description: Publish even if this version's base is already on nuget.org
        type: boolean
        default: false

env:
  # The full package version and the csdk build tag are computed by the resolve job (inputs.* are empty on the
  # schedule trigger, so nothing version-related can live here). Default the build config for the cron path.
  ZITI_DEBUG_OR_RELEASE: ${{ inputs.debugOrRelease || 'Release' }}
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  BUILD_NUMBER: ${{ github.run_number }}
  BASEDIR: ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore
  TARGETDIR: ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore/build

permissions:
  contents: read

jobs:
  # Decide what to publish and whether to publish at all. Two paths:
  #  - version input given (manual explicit): publish exactly that full <csdk>.<revision>.
  #  - version input blank (nightly cron, or manual "publish latest"): resolve the latest ziti-sdk-c release and
  #    publish it as <csdk>.<run_number> if nuget doesn't already have that base.
  # check-and-publish-native.ps1 dedups on the 3-part base, so republishing a new revision of an already-published
  # csdk base (e.g. 1.18.2.50 when 1.18.2.x exists) needs -Force.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      shouldPublish: ${{ steps.check.outputs.shouldPublish }}
      csdk: ${{ steps.norm.outputs.csdk }}
      version: ${{ steps.norm.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Check nuget vs ziti-sdk-c
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $force = '${{ inputs.force }}' -eq 'true'
          $v = '${{ inputs.version }}'
          if ($v) {
            ./scripts/check-and-publish-native.ps1 -Version $v -Force:$force -GithubToken $env:GH_TOKEN
          } else {
            ./scripts/check-and-publish-native.ps1 -Force:$force -GithubToken $env:GH_TOKEN
          }
      - name: Resolve full package version + csdk build tag
        id: norm
        run: |
          csdk="${{ steps.check.outputs.baseVersion }}"
          if [ -n "${{ inputs.version }}" ]; then
            full="${{ inputs.version }}"
          else
            # Automated path: the latest csdk tag plus this run's number as the revision (e.g. 1.19.0.42).
            full="${{ steps.check.outputs.version }}.${{ github.run_number }}"
          fi
          if ! echo "$full" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::resolved version '$full' is not <ziti-sdk-c version>.<revision>, e.g. 1.18.2.50"
            exit 1
          fi
          echo "csdk=$csdk" >> "$GITHUB_OUTPUT"
          echo "version=$full" >> "$GITHUB_OUTPUT"
          echo "resolved package version: $full  ->  csdk build tag: $csdk"

  # Create the rolling prerelease that holds the cache tarballs, once, before the matrix fans out, so the
  # parallel save steps never race to create it. Idempotent. Assets are keyed by the vcpkg baseline (read from
  # vcpkg.json) + RID, not the ziti version, so versions sharing a baseline reuse one cache.
  ensure-cache-release:
    needs: [resolve]
    if: needs.resolve.outputs.shouldPublish == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Ensure the native-build-cache release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/sync-vcpkg-cache.ps1 -Action ensure-release

  native-matrix-build:
    needs: [resolve, ensure-cache-release]
    # Skip everything when already published (resolve) or when triggered by dependabot.
    if: needs.resolve.outputs.shouldPublish == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      # The ziti-sdk-c release to build, resolved from the package version (CMake reads this to fetch the C SDK
      # source and, on Windows, the defgen archive).
      ZITI_SDK_C_BRANCH: ${{ needs.resolve.outputs.csdk }}
      # Binary cache is a plain local directory (vcpkg `files` provider). We sync that directory to/from a
      # rolling GitHub Release as one tarball per baseline+RID (scripts/sync-vcpkg-cache.ps1). No nuget, no mono.
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
      VCPKG_FEATURE_FLAGS: "manifests,binarycaching"
    strategy:
      fail-fast: false
      matrix:
        include:
          - ext: so
            prefix: lib
            dist: linux
            os: ubuntu-22.04
            arch: x64
            preset: linux-x64
            rid: linux-x64
          - ext: so
            prefix: lib
            dist: 'Linux-arm'
            os: ubuntu-22.04
            arch: arm
            preset: linux-arm
            rid: linux-arm
          - ext: so
            prefix: lib
            dist: 'Linux-arm64'
            os: ubuntu-22.04
            arch: arm64
            preset: linux-arm64
            rid: linux-arm64
          - ext: dylib
            prefix: lib
            dist: macos
            os: macos-14
            arch: x64
            preset: macOS-x64
            rid: osx-x64
          - ext: dylib
            prefix: lib
            dist: macos
            os: macos-14
            arch: arm64
            preset: macOS-arm64
            rid: osx-arm64
          - ext: dylib
            prefix: lib
            dist: iOS
            os: macos-14
            arch: arm64
            preset: ios-arm64
            rid: ios-arm64
          - ext: dll
            dist: win
            os: windows-2022
            arch: x64
            preset: win64
            rid: win-x64
          - ext: dll
            dist: win
            arch: x86
            os: windows-2022
            preset: win32
            rid: win-x86
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Pull this RID's prebuilt vcpkg deps from the rolling release (anonymous). A miss just builds them.
      - name: Restore native build cache (release)
        shell: pwsh
        run: ./scripts/sync-vcpkg-cache.ps1 -Action restore -Rid ${{ matrix.rid }} -CacheDir "${{ github.workspace }}/vcpkg-bincache"

      - name: Install Linux build tools
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update -y
          sudo apt install -y pkg-config ninja-build

      - name: Install Linux crossbuild tools
        if: matrix.os == 'ubuntu-22.04' && contains(matrix.arch, 'arm')
        run: |
          sudo apt install -y crossbuild-essential-armhf crossbuild-essential-arm64

      - name: install contemporary cmake
        if: runner.os != 'Linux'
        uses: lukka/get-cmake@v4.3.3

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja autoconf autoconf-archive automake pkg-config libtool

      - uses: lukka/run-vcpkg@v11

      - name: Set up MSVC
        if: matrix.dist == 'win'
        uses: microsoft/setup-msbuild@v3

      - name: Ensure ninja exists
        if: runner.os == 'macOS'
        working-directory: ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore
        run: |
          echo "PATH=$PATH"
          echo "which ninja -> $(which ninja || echo NOT_FOUND)"

      # Regenerate library/ziti.def from THIS C SDK version's actual exports so it never goes stale. All
      # logic lives in the script so it is runnable locally; Windows only (the .def is a Windows artifact).
      - name: Regenerate ziti.def from the C SDK release (Windows)
        if: matrix.dist == 'win'
        shell: pwsh
        run: ./scripts/regenerate-ziti-def.ps1 -Version "${{ needs.resolve.outputs.csdk }}"

      - name: Configure and build
        working-directory: ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore
        run: |
          echo "VCPKG_ROOT = ${{ env.VCPKG_ROOT }}"
          cmake -E make_directory ${{ env.TARGETDIR }}
          cmake -S ${{ env.BASEDIR }} -B ${{ env.TARGETDIR }} --preset ${{ matrix.preset }}
          cmake --build ${{ env.TARGETDIR }} --config ${{ env.ZITI_DEBUG_OR_RELEASE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.dist }}.${{ matrix.arch }}.${{ matrix.prefix }}ziti4dotnet.${{ matrix.ext }}
          path: ${{ env.TARGETDIR }}/library/**/${{ matrix.prefix }}ziti4dotnet.${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload cmake/vcpkg logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: logs.${{ matrix.dist }}.${{ matrix.arch }}
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore/build/vcpkg-manifest-install.log
            ${{ github.workspace }}/vcpkg/buildtrees/detect_compiler/**/*.log
            ${{ github.workspace }}/vcpkg/buildtrees/**/config-*-out.log
            ${{ github.workspace }}/vcpkg/buildtrees/**/config-*-err.log
            ${{ github.workspace }}/vcpkg/buildtrees/**/CMakeCache.txt.log
            ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore/build/CMakeFiles/**/*.log
            ${{ github.workspace }}/native/ZitiNativeApiForDotnetCore/build/**/CMakeCache.txt

      # Push this RID's deps to the rolling release. Runs on success or a real build failure (deps are built
      # before ziti4dotnet links, so they are worth keeping), but NOT on cancel. Skips upload when the cache
      # content is unchanged. Forks have no write token and simply error here; they are expected to pull only.
      - name: Save native build cache (release)
        if: ${{ success() || failure() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/sync-vcpkg-cache.ps1 -Action save -Rid ${{ matrix.rid }} -CacheDir "${{ github.workspace }}/vcpkg-bincache"


  create-nuget-package:
    needs: [resolve, native-matrix-build]
    runs-on: windows-2022
    outputs:
      resolvedversion: ${{ steps.ver.outputs.resolvedversion }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set resolved version
        id: ver
        shell: pwsh
        run: |
          # The published package version, resolved once in the resolve job (e.g. 1.18.2.50).
          $v = "${{ needs.resolve.outputs.version }}"
          "resolvedversion=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "resolvedversion=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - run: mkdir ${{github.workspace}}/native-libs

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{github.workspace}}/native-libs

      - name: Move files to expected locations
        run: |
          Write-Host "locating all the built libraries:"
          Get-ChildItem -Recurse *ziti4dotnet*

          Write-Host "creating the RIDs"
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\osx-x64\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\osx-arm64\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\ios-arm64\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\linux-arm\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\linux-arm64\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\linux-x64\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\win-x86\native
          New-Item -ItemType Directory -Force ${{ github.workspace }}\runtimes\win-x64\native

          Write-Host "moving the build libraries to the RIDs"
          Move-Item ${{ github.workspace }}\native-libs\macos.x64.libziti4dotnet.dylib\libziti4dotnet.dylib ${{ github.workspace }}\runtimes\osx-x64\native
          Move-Item ${{ github.workspace }}\native-libs\macos.arm64.libziti4dotnet.dylib\libziti4dotnet.dylib ${{ github.workspace }}\runtimes\osx-arm64\native
          Move-Item ${{ github.workspace }}\native-libs\iOS.arm64.libziti4dotnet.dylib\libziti4dotnet.dylib ${{ github.workspace }}\runtimes\ios-arm64\native
          Move-Item ${{ github.workspace }}\native-libs\Linux-arm64.arm64.libziti4dotnet.so\libziti4dotnet.so ${{ github.workspace }}\runtimes\linux-arm64\native
          Move-Item ${{ github.workspace }}\native-libs\Linux-arm.arm.libziti4dotnet.so\libziti4dotnet.so ${{ github.workspace }}\runtimes\linux-arm\native
          Move-Item ${{ github.workspace }}\native-libs\linux.x64.libziti4dotnet.so\libziti4dotnet.so ${{ github.workspace }}\runtimes\linux-x64\native
          Move-Item ${{ github.workspace }}\native-libs\win.x64.ziti4dotnet.dll\${{ env.ZITI_DEBUG_OR_RELEASE }}\ziti4dotnet.dll ${{ github.workspace }}\runtimes\win-x64\native
          Move-Item ${{ github.workspace }}\native-libs\win.x86.ziti4dotnet.dll\${{ env.ZITI_DEBUG_OR_RELEASE }}\ziti4dotnet.dll ${{ github.workspace }}\runtimes\win-x86\native


      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Create the Nuget package
        run: nuget pack -version ${{env.resolvedversion}} ${{ github.workspace }}\native-package.nuspec

      - name: Upload nuget package
        uses: actions/upload-artifact@v6
        with:
          path: ${{ github.workspace }}\OpenZiti.NET.native.${{env.resolvedversion}}.nupkg
          name: OpenZiti.NET.native.${{env.resolvedversion}}.nupkg
          if-no-files-found: error

  # ---- Pre-publish gates ----------------------------------------------------------------------------
  # Hard gate: prove the freshly packed native lib LOADS and is callable on every natively-runnable RID.
  # linux-arm, linux-arm64, and ios-arm64 are cross-compiled and cannot run on hosted runners, so they are
  # NOT smoke-tested here. That is a known coverage gap (logged below), not a silent skip.
  smoke-test:
    needs: [create-nuget-package]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-2022
          - rid: win-x86
            os: windows-2022
          - rid: osx-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    env:
      resolvedversion: ${{ needs.create-nuget-package.outputs.resolvedversion }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
      - name: Note un-smoke-tested RIDs
        shell: bash
        run: 'echo "NOT smoke-tested on hosted runners (cross-compiled or scarce Intel-mac runner): linux-arm, linux-arm64, osx-x64, ios-arm64"'
      - name: Download packed nupkg
        uses: actions/download-artifact@v4
        with:
          name: OpenZiti.NET.native.${{ env.resolvedversion }}.nupkg
          path: ${{ github.workspace }}/artifacts
      - name: Smoke test (load probe)
        shell: pwsh
        run: ./scripts/run-smoke-test.ps1 -PackageDir "${{ github.workspace }}/artifacts" -PackageVersion "${{ env.resolvedversion }}" -Rid ${{ matrix.rid }}

  # HARD gate: real traffic must flow through the fresh lib via a quickstart overlay and the prox-c
  # recreation, on every natively-runnable desktop RID and both ziti lines, before publish. A failure here
  # blocks the push (publish depends on this job, no continue-on-error).
  e2e-test:
    needs: [create-nuget-package]
    strategy:
      fail-fast: false
      matrix:
        # Exercise BOTH ziti lines (1.6.x and 2.0.x) across every natively-runnable desktop RID before publish.
        ziti: [v1.6.14, v2.0.0]
        target:
          - { rid: linux-x64, os: ubuntu-latest }
          - { rid: win-x64, os: windows-2022 }
          - { rid: osx-arm64, os: macos-14 }
    runs-on: ${{ matrix.target.os }}
    env:
      resolvedversion: ${{ needs.create-nuget-package.outputs.resolvedversion }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
      - name: Download packed nupkg
        uses: actions/download-artifact@v4
        with:
          name: OpenZiti.NET.native.${{ env.resolvedversion }}.nupkg
          path: ${{ github.workspace }}/artifacts
      - name: Put ziti ${{ matrix.ziti }} on PATH
        uses: openziti/ziti/setup-cli@main
        with:
          version: ${{ matrix.ziti }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Traffic e2e (quickstart + prox-c) - ${{ matrix.target.rid }} / ziti ${{ matrix.ziti }}
        shell: pwsh
        env:
          # DEBUG so the native ziti SDK prints why a dial fails (e.g. the real rc behind a closed bridge).
          ZITI_LOG: "4"
        run: ./scripts/run-e2e-test.ps1 -PackageDir "${{ github.workspace }}/artifacts" -PackageVersion "${{ env.resolvedversion }}" -Rid ${{ matrix.target.rid }}

  # Push only after the hard smoke AND e2e gates pass, and only from the canonical repo.
  publish:
    needs: [create-nuget-package, smoke-test, e2e-test]
    # Push only from the canonical repo, and never on a dry run.
    if: ${{ github.repository == 'openziti/ziti-sdk-csharp' && inputs.dryRun != true }}
    runs-on: windows-2022
    # Overrides the top-level contents:read so the release step can create the tag + GitHub Release.
    permissions:
      contents: write
    env:
      resolvedversion: ${{ needs.create-nuget-package.outputs.resolvedversion }}
    steps:
      # Checked out for the release step (changelog file + gh repo context). The nupkg is downloaded separately.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
      - name: Download packed nupkg
        uses: actions/download-artifact@v4
        with:
          name: OpenZiti.NET.native.${{ env.resolvedversion }}.nupkg
          path: ${{ github.workspace }}/artifacts
      - name: Publish OpenZiti.NET.native
        run: dotnet nuget push "${{ github.workspace }}/artifacts/OpenZiti.NET.native.${{ env.resolvedversion }}.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      # Tag + GitHub Release, only reached after the push above (which only runs after the smoke + e2e gates).
      # gh release create makes a lightweight tag on github.sha; it inherits "Verified" when that commit was a
      # Squash/Merge-button commit. Notes come from the ziti-sdk-c version's section of CHANGELOG.native.md.
      - name: Tag + GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/create-release.ps1 `
            -Tag "OpenZiti.NET.native/${{ env.resolvedversion }}" `
            -Title "OpenZiti.NET.native ${{ env.resolvedversion }}" `
            -TargetSha "${{ github.sha }}" `
            -ChangelogFile "CHANGELOG.native.md" `
            -Section "${{ env.resolvedversion }}" `
            -AllowGeneratedNotes

  # Keep the repo active so GitHub doesn't disable this nightly after 60 days of inactivity, and log publishes.
  # Runs after the publish attempt on every main-branch run (always(), even when nothing shipped): a successful
  # publish is logged, which resets the 60-day clock; otherwise it commits a heartbeat only once the repo has been
  # quiet ~50 days, so a long ziti-sdk-c dry spell can't let the cron lapse. Logic is in scripts/keepalive.sh.
  keepalive:
    needs: [resolve, publish]
    if: ${{ always() && github.ref == 'refs/heads/main' && github.repository == 'openziti/ziti-sdk-csharp' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Keepalive / publish log
        run: |
          if [ "${{ needs.publish.result }}" = "success" ]; then
            ./scripts/keepalive.sh --published "${{ needs.resolve.outputs.version }}"
          else
            ./scripts/keepalive.sh
          fi

  # Failure-only notification over the mattermost ziti webhook. The action has no free-text message input, it
  # formats from the event JSON, so we feed it a crafted event with NO inputs (which is what produced the ugly
  # JSON dump) and a concise failure line plus the run URL instead. Depends on the hard-gate jobs only, so the
  # soft e2e does not trigger it, and a clean "already published" skip is not a failure so it stays quiet.
  notify-failure:
    needs: [resolve, native-matrix-build, create-nuget-package, smoke-test, publish]
    if: ${{ failure() && github.repository_owner == 'openziti' }}
    runs-on: ubuntu-latest
    name: POST Webhook (failure)
    steps:
      - uses: openziti/ziti-mattermost-action-py@main
        with:
          zitiId: ${{ secrets.ZITI_MATTERMOST_IDENTITY }}
          webhookUrl: ${{ secrets.ZHOOK_URL }}
          eventJson: '{"repository":{"full_name":"${{ github.repository }}","html_url":"${{ github.server_url }}/${{ github.repository }}"},"sender":{"login":"GitHubZ","avatar_url":"https://github.com/fluidicon.png","html_url":"${{ github.server_url }}/${{ github.repository }}"},"workflow":"native-nuget-publish FAILED for ${{ needs.resolve.outputs.version }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          senderUsername: "GitHubZ"
          destChannel: "dev-notifications"
